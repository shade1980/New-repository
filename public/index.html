<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة كرم - لوحة التحكم</title>
</head>
<body>
    <h1>مرحباً بك يا أبو علي في لوحة تحكم "كرم"</h1>
    
    <button id="likeBtn">تفعيل اللايك التلقائي</button>
    <p id="statusMsg"></p>

    <script>
        // الرابط السحابي الخاص بسيرفرك
        const API_BASE = 'https://karam-server.onrender.com';

        document.getElementById('likeBtn').addEventListener('click', async () => {
            const status = document.getElementById('statusMsg');
            status.innerText = "جاري الاتصال بالسيرفر...";

            try {
                // إرسال طلب تفعيل للسيرفر
                const response = await fetch(`${API_BASE}/api/dashboard/settings`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        userId: "USER_ID_HERE", // هنا ستضع معرف المستخدم الحقيقي
                        autoLikeEnabled: true 
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    status.innerText = "✅ تم تفعيل اللايك بنجاح!";
                } else {
                    status.innerText = "❌ فشل التفعيل: " + data.error;
                }
            } catch (err) {
                status.innerText = "⚠️ خطأ في الاتصال بالخادم، تأكد من عمل السيرفر.";
            }
        });
    </script>
</body>
</html>
