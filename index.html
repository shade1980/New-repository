<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة كرم | تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { colors: { brandDark: '#0f172a', brandCard: '#1e293b', brandBlue: '#3b82f6' } }
            }
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-brandDark text-gray-900 dark:text-white min-h-screen transition-colors">

    <!-- شاشة تسجيل الدخول -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white dark:bg-brandCard p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100 dark:border-gray-800">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-brandBlue text-white rounded-full flex items-center justify-center text-3xl font-bold mx-auto mb-4 shadow-lg">K</div>
                <h1 class="text-2xl font-bold">تسجيل الدخول لمنصة كرم</h1>
                <p class="text-gray-500 text-sm mt-2">الرجاء إدخال بيانات حسابك للمتابعة</p>
            </div>
            
            <form id="loginForm" class="space-y-4" onsubmit="handleLogin(event)">
                <div>
                    <label class="block text-sm font-bold mb-2">اسم المستخدم</label>
                    <input type="text" id="username" required class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-brandBlue text-left" dir="ltr">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">كلمة المرور</label>
                    <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-brandBlue text-left" dir="ltr">
                </div>
                <button type="submit" class="w-full bg-brandBlue hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition-all shadow-md mt-4">
                    دخول إلى لوحة التحكم
                </button>
                <p id="errorMessage" class="text-red-500 text-sm text-center hidden mt-2"></p>
            </form>
        </div>
    </div>

    <!-- لوحة التحكم (مخفية حتى يتم تسجيل الدخول) -->
    <div id="dashboardScreen" class="hidden pb-20">
        <header class="flex justify-between items-center p-4 bg-white dark:bg-brandCard shadow-sm">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-brandBlue text-white flex items-center justify-center font-bold text-xl">K</div>
                <div>
                    <h1 class="font-bold" id="dashUsername">مرحباً...</h1>
                    <p class="text-xs text-green-500"><i class="fas fa-circle text-[8px] mr-1"></i> متصل بالسيرفر</p>
                </div>
            </div>
            <button onclick="logout()" class="text-red-500 font-bold text-sm"><i class="fas fa-sign-out-alt ml-1"></i> خروج</button>
        </header>

        <main class="p-4 max-w-md mx-auto mt-4 space-y-4">
            
            <!-- ربط فيسبوك -->
            <div class="bg-white dark:bg-brandCard rounded-2xl p-5 shadow border border-gray-100 dark:border-gray-800 text-center">
                <i class="fab fa-facebook text-4xl text-blue-600 mb-3"></i>
                <h3 class="font-bold text-lg mb-2">ربط حساب فيسبوك</h3>
                <p class="text-sm text-gray-500 mb-4">اربط صفحاتك لإدارة التعليقات والرسائل تلقائياً.</p>
                <button onclick="connectFacebook()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md">
                    <i class="fas fa-link ml-2"></i> ربط حسابي الآن
                </button>
            </div>

            <!-- إعدادات البوت -->
            <h2 class="font-bold text-xl mt-6 mb-2">إعدادات البوت التلقائي</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white dark:bg-brandCard p-4 rounded-2xl shadow border border-gray-100 dark:border-gray-800 text-center">
                    <i class="fas fa-comment-dots text-2xl text-emerald-500 mb-2"></i>
                    <h3 class="font-bold">التعليق الذهبي</h3>
                    <span class="text-xs text-emerald-500 font-bold mt-2 block">مفعل</span>
                </div>
                <div class="bg-white dark:bg-brandCard p-4 rounded-2xl shadow border border-gray-100 dark:border-gray-800 text-center">
                    <i class="fas fa-heart text-2xl text-red-500 mb-2"></i>
                    <h3 class="font-bold">اللايك الذهبي</h3>
                    <span class="text-xs text-red-500 font-bold mt-2 block">مفعل</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        // رابط السيرفر الحقيقي (الذي يحتوي على الكود الأول)
        // عند رفعه على سيرفر حقيقي، استبدل هذا الرابط برابط السيرفر
        const SERVER_URL = 'http://localhost:3000'; 
        let currentUserId = localStorage.getItem('karam_user_id');
        let currentToken = localStorage.getItem('karam_token');

        // التحقق من حالة الدخول عند فتح الصفحة
        window.onload = () => {
            if (currentToken && currentUserId) {
                showDashboard(localStorage.getItem('karam_username'));
            }
        };

        // دالة تسجيل الدخول الحقيقية
        async function handleLogin(e) {
            e.preventDefault();
            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');

            try {
                // إرسال طلب حقيقي للسيرفر
                const response = await fetch(`${SERVER_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });

                const data = await response.json();

                if (response.ok) {
                    // حفظ البيانات في المتصفح
                    localStorage.setItem('karam_token', data.token);
                    localStorage.setItem('karam_user_id', data.userId);
                    localStorage.setItem('karam_username', data.username);
                    
                    currentUserId = data.userId;
                    showDashboard(data.username);
                } else {
                    errorMsg.innerText = data.message;
                    errorMsg.classList.remove('hidden');
                }
            } catch (error) {
                errorMsg.innerText = "تعذر الاتصال بالسيرفر. تأكد من تشغيل السيرفر الخلفي.";
                errorMsg.classList.remove('hidden');
            }
        }

        // دالة الربط مع فيسبوك الحقيقية
        async function connectFacebook() {
            try {
                const response = await fetch(`${SERVER_URL}/api/facebook/login-url?userId=${currentUserId}`);
                const data = await response.json();
                if (data.url) {
                    // إعادة توجيه المستخدم لصفحة فيسبوك الرسمية للموافقة
                    window.location.href = data.url;
                }
            } catch (error) {
                alert("تعذر الاتصال بالسيرفر لطلب رابط الربط.");
            }
        }

        function showDashboard(username) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            document.getElementById('dashUsername').innerText = username;
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
